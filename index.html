<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f7f6f3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Task Log">
<title>Task Log</title>
<link rel="manifest" href="manifest.json">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#eeecea;
  --text:#181816;--text2:#636360;--text3:#9c9b97;
  --transfer:#0c447c;--transfer-bg:#e6f1fb;--transfer-border:#378ADD;
  --tour:#0F6E56;--tour-bg:#E1F5EE;--tour-border:#1D9E75;
  --accent:#534AB7;--accent-bg:#EEEDFE;--accent-light:#AFA9EC;
  --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.16);
  --r:10px;--r-lg:16px;--r-xl:20px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  --nav-h:64px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#171715;--bg2:#1e1e1c;--bg3:#272724;
  --text:#f0efe9;--text2:#a0a09a;--text3:#686862;
  --transfer:#85b7eb;--transfer-bg:#042c53;--transfer-border:#185FA5;
  --tour:#5DCAA5;--tour-bg:#04342C;--tour-border:#0F6E56;
  --accent:#AFA9EC;--accent-bg:#26215C;--accent-light:#534AB7;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
}}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;overscroll-behavior:none}
.shell{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:16px 18px 12px;flex-shrink:0;padding-top:calc(16px + env(safe-area-inset-top))}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.app-title{font-size:20px;font-weight:700;letter-spacing:-0.5px;color:var(--text)}
.month-pill select{background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:500;color:var(--text);font-family:var(--font);cursor:pointer;outline:none;appearance:none;-webkit-appearance:none}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.page{display:none}.page.active{display:block}
.section{padding:16px 18px 0}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3);margin-bottom:10px}
.add-card{background:var(--bg2);border-radius:var(--r-xl);padding:16px;margin-bottom:4px}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:6px;display:block}
input[type=date],select.inp{width:100%;padding:11px 13px;border:0.5px solid var(--border2);border-radius:var(--r);font-size:15px;background:var(--bg);color:var(--text);font-family:var(--font);outline:none;appearance:none;-webkit-appearance:none;transition:border-color .15s}
input[type=date]:focus,select.inp:focus{border-color:var(--accent-light);box-shadow:0 0 0 3px rgba(83,74,183,0.12)}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.type-btn{padding:13px 8px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font);color:var(--text2);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.type-btn.active-transfer{background:var(--transfer-bg);border:1.5px solid var(--transfer-border);color:var(--transfer)}
.type-btn.active-tour{background:var(--tour-bg);border:1.5px solid var(--tour-border);color:var(--tour)}
.type-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.submit-btn{width:100%;padding:14px;background:var(--accent-bg);border:none;border-radius:var(--r-lg);font-size:15px;font-weight:700;color:var(--accent);cursor:pointer;font-family:var(--font);margin-top:4px;transition:opacity .15s}
.submit-btn:active{opacity:0.65}
.day-group{margin-bottom:4px}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px}
.day-date{font-size:13px;font-weight:700;color:var(--text)}
.day-count{background:var(--bg3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--text2)}
.task-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.task-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-icon.transfer{background:var(--transfer-bg)}
.task-icon.tour{background:var(--tour-bg)}
.task-icon svg{width:19px;height:19px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.task-body{flex:1;min-width:0}
.task-name{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-meta{font-size:12px;color:var(--text3);margin-top:2px}
.task-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;flex-shrink:0;white-space:nowrap}
.task-badge.transfer{background:var(--transfer-bg);color:var(--transfer)}
.task-badge.tour{background:var(--tour-bg);color:var(--tour)}
.del-btn{width:30px;height:30px;border-radius:50%;background:transparent;border:0.5px solid var(--border);cursor:pointer;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font)}
.del-btn:active{background:#fcebeb;color:#791f1f;border-color:transparent}
.empty-state{text-align:center;padding:48px 0;color:var(--text3);font-size:14px}
.nav-bar{height:var(--nav-h);background:var(--bg);border-top:0.5px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;background:transparent;border:none;cursor:pointer;font-family:var(--font);padding:6px 8px;transition:all .15s;border-radius:var(--r-lg);margin:6px}
.nav-btn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn span{font-size:11px;font-weight:600}
.nav-btn.log-inactive{color:var(--text3)}
.nav-btn.log-active{background:var(--transfer-bg);color:var(--transfer)}
.nav-btn.sum-inactive{color:var(--text3)}
.nav-btn.sum-active{background:var(--tour-bg);color:var(--tour)}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-card{background:var(--bg2);border-radius:var(--r-lg);padding:16px}
.sum-card-full{grid-column:span 2}
.sum-num{font-size:30px;font-weight:700;letter-spacing:-0.5px}
.sum-num.transfer{color:var(--transfer)}
.sum-num.tour{color:var(--tour)}
.sum-num.total{color:var(--accent)}
.sum-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;font-weight:500;margin-top:4px}
.breakdown-row{display:flex;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--border)}
.breakdown-row:last-child{border-bottom:none}
.breakdown-name{font-size:13px;color:var(--text);font-weight:500;width:115px;flex-shrink:0}
.breakdown-count{font-size:13px;font-weight:700;color:var(--text2);min-width:22px;text-align:right;flex-shrink:0}
.breakdown-bar-wrap{flex:1;margin:0 10px;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.breakdown-bar{height:100%;border-radius:3px}
.install-banner{background:var(--accent-bg);border-radius:var(--r-lg);padding:13px 14px;margin:14px 18px 0;display:flex;align-items:center;gap:10px}
.install-banner-text{flex:1;font-size:13px;color:var(--accent);line-height:1.4;font-weight:500}
.install-btn{background:var(--accent);color:#fff;border:none;border-radius:var(--r);padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);flex-shrink:0}
.install-close{background:transparent;border:none;color:var(--accent);font-size:18px;cursor:pointer;padding:0 2px;flex-shrink:0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="topbar-row">
      <span class="app-title">Task Log</span>
      <div class="month-pill">
        <select id="month-filter" onchange="onMonthChange()"></select>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="install-banner-wrap"></div>

    <div class="page active" id="page-log">
      <div class="section">
        <div class="section-title">Add task</div>
        <div class="add-card">
          <div class="field">
            <label class="field-label">Date</label>
            <input type="date" id="task-date">
          </div>
          <div class="field">
            <label class="field-label">Type</label>
            <div class="type-toggle">
              <button class="type-btn active-transfer" id="btn-transfer" onclick="setType('Transfer')">
                <svg viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/><circle cx="16" cy="19.5" r="2.5"/><circle cx="6.5" cy="19.5" r="2.5"/></svg>
                Transfer
              </button>
              <button class="type-btn" id="btn-tour" onclick="setType('Tour')">
                <svg viewBox="0 0 24 24"><path d="M2 12 C5 8 9 8 12 12 C15 16 19 16 22 12"/><path d="M2 6 C5 2 9 2 12 6 C15 10 19 10 22 6"/><path d="M2 18 C5 14 9 14 12 18 C15 22 19 22 22 18"/></svg>
                Tour
              </button>
            </div>
          </div>
          <div class="field">
            <label class="field-label" id="subtype-label">Transfer type</label>
            <select class="inp" id="task-subtype"></select>
          </div>
          <div class="field">
            <label class="field-label">Operator</label>
            <select class="inp" id="task-operator">
              <option value="">Select operator…</option>
              <option>Itaka</option>
              <option>Exim</option>
              <option>Exim Fischer</option>
              <option>Dertour</option>
              <option>Novaturas LT</option>
              <option>Novatours ES</option>
              <option>Novatours LV</option>
              <option>Solferias</option>
              <option>Itaka HU</option>
              <option>Mixed</option>
            </select>
          </div>
          <button class="submit-btn" onclick="addTask()">+ Add task</button>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Tasks</div>
        <div id="task-list"></div>
      </div>
    </div>

    <div class="page" id="page-summary">
      <div class="section">
        <div class="section-title">Monthly overview</div>
        <div class="summary-grid">
          <div class="sum-card sum-card-full">
            <div class="sum-num total" id="sum-total">0</div>
            <div class="sum-label">Total tasks</div>
          </div>
          <div class="sum-card">
            <div class="sum-num transfer" id="sum-transfers">0</div>
            <div class="sum-label">Transfers</div>
          </div>
          <div class="sum-card">
            <div class="sum-num tour" id="sum-tours">0</div>
            <div class="sum-label">Tours</div>
          </div>
        </div>
        <div class="section-title" style="margin-top:8px">Breakdown by task</div>
        <div style="background:var(--bg2);border-radius:var(--r-lg);padding:2px 14px" id="breakdown-list"></div>
      </div>
    </div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn log-active" id="nav-log" onclick="showPage('log')">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span>Log</span>
    </button>
    <button class="nav-btn sum-inactive" id="nav-summary" onclick="showPage('summary')">
      <svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Summary</span>
    </button>
  </div>
</div>

<script>
const TRANSFER_TYPES=['Departure','Arrival','Tour Pickup','Cairo by bus','Cairo by plane','Turnaway'];
const TOUR_NAMES=['Dolphin show','Ras Mohamed','Liberty Catamaran','Safari','Super Safari','Mini Safari','City tour','Magic Dahab','Dahab Safari','Cairo Overday'];
let tasks=[];let selectedType='Transfer';let currentMonth='';
try{tasks=JSON.parse(localStorage.getItem('tasklg_pwa')||'[]');}catch(e){}
function save(){try{localStorage.setItem('tasklg_pwa',JSON.stringify(tasks));}catch(e){}}
function today(){return new Date().toISOString().slice(0,10);}
function allMonths(){const s=new Set();tasks.forEach(t=>s.add(t.date.slice(0,7)));s.add(today().slice(0,7));return[...s].sort().reverse();}
function monthLabel(ym){const[y,m]=ym.split('-');return new Date(+y,+m-1,1).toLocaleString('en',{month:'long',year:'numeric'});}
function shortDay(d){return new Date(d+'T12:00').toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short'});}
function populateMonths(){
  const sel=document.getElementById('month-filter');
  const months=allMonths();const cur=sel.value||months[0];
  sel.innerHTML=months.map(m=>`<option value="${m}"${m===cur?' selected':''}>${monthLabel(m)}</option>`).join('');
  currentMonth=sel.value||months[0];
}
function setType(type){
  selectedType=type;
  document.getElementById('btn-transfer').className='type-btn'+(type==='Transfer'?' active-transfer':'');
  document.getElementById('btn-tour').className='type-btn'+(type==='Tour'?' active-tour':'');
  document.getElementById('subtype-label').textContent=type==='Transfer'?'Transfer type':'Tour name';
  const opts=type==='Transfer'?TRANSFER_TYPES:TOUR_NAMES;
  document.getElementById('task-subtype').innerHTML=opts.map(o=>`<option>${o}</option>`).join('');
}
function addTask(){
  const date=document.getElementById('task-date').value;
  const subtype=document.getElementById('task-subtype').value;
  const operator=document.getElementById('task-operator').value;
  if(!date){alert('Please select a date.');return;}
  if(!operator){alert('Please select an operator.');return;}
  tasks.push({id:Date.now(),date,type:selectedType,subtype,operator});
  tasks.sort((a,b)=>b.date.localeCompare(a.date));
  save();document.getElementById('task-operator').value='';
  populateMonths();render();
}
function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  tasks=tasks.filter(t=>t.id!==id);save();populateMonths();render();
}
function onMonthChange(){currentMonth=document.getElementById('month-filter').value;render();}
function filteredTasks(){return tasks.filter(t=>t.date.startsWith(currentMonth));}
const TSVG=`<svg style="width:19px;height:19px;stroke:var(--transfer);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v5"/><circle cx="16" cy="19.5" r="2.5"/><circle cx="6.5" cy="19.5" r="2.5"/></svg>`;
const TOSVG=`<svg style="width:19px;height:19px;stroke:var(--tour);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round" viewBox="0 0 24 24"><path d="M2 12 C5 8 9 8 12 12 C15 16 19 16 22 12"/><path d="M2 6 C5 2 9 2 12 6 C15 10 19 10 22 6"/><path d="M2 18 C5 14 9 14 12 18 C15 22 19 22 22 18"/></svg>`;
function renderLog(){
  const f=filteredTasks();const cont=document.getElementById('task-list');
  if(f.length===0){cont.innerHTML='<div class="empty-state">No tasks this month</div>';return;}
  const byDay={};f.forEach(t=>{(byDay[t.date]=byDay[t.date]||[]).push(t);});
  cont.innerHTML=Object.keys(byDay).sort((a,b)=>b.localeCompare(a)).map(d=>{
    const list=byDay[d];const isT=t=>t.type==='Transfer';
    return`<div class="day-group"><div class="day-header"><span class="day-date">${shortDay(d)}</span><span class="day-count">${list.length} task${list.length>1?'s':''}</span></div>${list.map(t=>`<div class="task-card"><div class="task-icon ${isT(t)?'transfer':'tour'}">${isT(t)?TSVG:TOSVG}</div><div class="task-body"><div class="task-name">${t.subtype}</div><div class="task-meta">${t.operator}</div></div><span class="task-badge ${isT(t)?'transfer':'tour'}">${t.type}</span><button class="del-btn" onclick="deleteTask(${t.id})">✕</button></div>`).join('')}</div>`;
  }).join('');
}
function renderSummary(){
  const f=filteredTasks();
  document.getElementById('sum-total').textContent=f.length;
  document.getElementById('sum-transfers').textContent=f.filter(t=>t.type==='Transfer').length;
  document.getElementById('sum-tours').textContent=f.filter(t=>t.type==='Tour').length;
  const counts={};f.forEach(t=>{counts[t.subtype]=(counts[t.subtype]||0)+1;});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const max=sorted.length?sorted[0][1]:1;
  const bl=document.getElementById('breakdown-list');
  if(sorted.length===0){bl.innerHTML='<div class="empty-state" style="padding:20px 0">No tasks this month</div>';return;}
  bl.innerHTML=sorted.map(([name,count])=>{
    const isTransfer=TRANSFER_TYPES.includes(name);
    const pct=Math.round((count/max)*100);
    return`<div class="breakdown-row"><span class="breakdown-name">${name}</span><div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:${pct}%;background:${isTransfer?'var(--transfer)':'var(--tour)'}"></div></div><span class="breakdown-count">${count}</span></div>`;
  }).join('');
}
function render(){renderLog();renderSummary();}
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-log').className='nav-btn '+(name==='log'?'log-active':'log-inactive');
  document.getElementById('nav-summary').className='nav-btn '+(name==='summary'?'sum-active':'sum-inactive');
}
let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner-wrap').innerHTML=`<div class="install-banner"><div class="install-banner-text">Install Task Log on your home screen</div><button class="install-btn" onclick="doInstall()">Install</button><button class="install-close" onclick="document.getElementById('install-banner-wrap').innerHTML=''">✕</button></div>`;
});
function doInstall(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}document.getElementById('install-banner-wrap').innerHTML='';}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
document.getElementById('task-date').value=today();
setType('Transfer');populateMonths();render();
</script>
</body>
</html>
